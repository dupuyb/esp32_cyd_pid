[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_port = /dev/tty.usbserial- 14320
monitor_filters = esp32_exception_decoder
upload_port = /dev/tty.usbserial-14320
;upload_speed = 921000

; board_build.partitions = no_ota.csv
extra_scripts = pre:prebuild.py

lib_deps = 
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@^9.2.2
	https://github.com/beegee-tokyo/DHTesp.git
	; WebFramework and dependencies
  https://github.com/tzapu/WiFiManager.git#master
  https://github.com/Links2004/arduinoWebSockets#master
  DNSServer
  WebServer
  ArduinoJson
	https://github.com/dupuyb/Esp32_Framework.git

build_flags = 
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM											# PSRAM mod used - no RGB LED
	-mfix-esp32-psram-cache-issue					#
 	-mfix-esp32-psram-cache-strategy=memw	#
	-DUSE_BACKLIGHT_MOD										# TFT fixed backlight mod used, will free up the GPIO21
	-DAUDIO_LOG 													# enable log info in the audio library
	-DLV_CONF_INCLUDE_SIMPLE

build_src_filter = +<*> 
   -<.git/> 
   -<.svn/> 
   -<.pio/libdeps/esp32dev/Esp32_Framework/src/examples/*> ; exclude example demo*.cpp files

[platformio]
description = ESP32 CYD Pid Controller